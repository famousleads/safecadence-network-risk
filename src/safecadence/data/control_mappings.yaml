  nist_800_53: [AC-2, AC-3, IA-2, AU-2]
  cis_v8: ["6.1", "6.2", "6.7"]
  pci_dss_4: ["7.2.1", "8.2.1", "10.2.1"]
  hipaa: ["164.308(a)(4)", "164.312(a)(2)(i)"]
  iso_27001_2022: [A.8.2, A.8.3, A.8.5]
  soc2_tsc: [CC6.1, CC6.2, CC6.3]
  owner_default: network_eng
  sla_severity_days: {critical: 7, high: 30, medium: 90, low: 180}
  frequency: continuous
  evidence_type: config_snapshot

enforce_snmpv3:
