# SafeCadence v9.27 — control framework mappings.
#
# Each entry: a SafeCadence control id (matches policy/controls/*.py)
# mapped to its equivalent control IDs in the major frameworks.
#
# Schema:
#   <control_id>:
#     description     short label for the coverage page
#     domain          network | server | identity | cloud | backup | storage
#     nist_800_53     list of NIST 800-53 r5 sub-control IDs (AC-2, etc.)
#     cis_v8          list of CIS Critical Security Controls v8 (1.1, 4.6, ...)
#     pci_dss_4       list of PCI-DSS 4.0 requirement numbers
#     hipaa           list of HIPAA Safeguard citations (164.308(a)(1), ...)
#     iso_27001_2022  list of Annex A control numbers (A.5.1, A.8.16, ...)
#     soc2_tsc        list of SOC 2 Trust Services Criteria (CC6.1, CC7.2, ...)
#     owner_default   role expected to own this control (when unset on policy)
#     sla_severity_days  default time-to-remediate by severity, e.g. critical=7
#     frequency       continuous | daily | weekly | monthly | quarterly | annual
#     evidence_type   config_snapshot | log_review | screenshot | csv | api_pull
#
# Maintenance: when a new SafeCadence control lands in
# policy/controls/, add a row here. The /compliance page will surface
# it as "covered" against any framework it cites.

# ============================================================ NETWORK

disable_telnet:
  description: Disable telnet — SSH-only mgmt
  domain: network
  nist_800_53: [AC-17, SC-8, SC-23]
  cis_v8: ["4.6", "12.6"]
  pci_dss_4: ["2.2.7", "8.2.1"]
  hipaa: ["164.312(e)(1)"]
  iso_27001_2022: [A.8.20, A.8.21]
  soc2_tsc: [CC6.1, CC6.7]
  owner_default: network_eng
  sla_severity_days: {critical: 1, high: 7, medium: 30, low: 90}
  frequency: continuous
  evidence_type: config_snapshot

enforce_ssh_v2:
  description: SSH version 2 enforced on management plane
  domain: network
  nist_800_53: [SC-8, SC-13, IA-2]
  cis_v8: ["4.6", "12.6"]
  pci_dss_4: ["2.2.7", "4.2.1"]
  hipaa: ["164.312(e)(2)(ii)"]
  iso_27001_2022: [A.8.20, A.8.24]
  soc2_tsc: [CC6.1, CC6.7]
  owner_default: network_eng
  sla_severity_days: {critical: 7, high: 30, medium: 90, low: 180}
  frequency: continuous
  evidence_type: config_snapshot

require_aaa:
