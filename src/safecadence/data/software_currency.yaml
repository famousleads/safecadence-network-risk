# SafeCadence v9.26 — software currency reference.
#
# Maps (vendor, product_family) to a recommended-version table. The
# evaluator compares the asset's running version against this table
# and emits a status: current / supported / behind / eol / kev_vulnerable.
#
# Maintenance notes:
#   * `recommended` is the current "safe" version (latest stable -
#     N for stability where applicable).
#   * `min_supported` is the floor below which we mark the asset
#     "behind" — usually one major below recommended.
#   * `eol` is the version after which vendor support is dead.
#   * `known_kev_versions` is a list of version strings (or regexes)
#     that contain unpatched KEV CVEs. Stronger signal than "behind".
#
# This file is community-maintainable. Vendor announcements move it.
# When a real CVE lands a new entry should be added here AND in the
# main CVE bundle so the score reflects it twice (currency + risk).

