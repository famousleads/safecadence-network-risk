# Cisco IOS — Credentials, secrets, and password storage
---
- id: cisco-ios-type-7-passwords
  title: Type-7 reversibly-encrypted passwords in use
  severity: high
  vendor: cisco-ios
  domain: security
  description: |
    Type-7 passwords use a trivially-reversible Vigenere cipher. Anyone
    reading the running-config can decrypt them in seconds.
  remediation: |
    Replace all enable / username passwords with type-8 (PBKDF2) or
    type-9 (scrypt) hashes.
  fix_snippet: |
    enable algorithm-type scrypt secret <strong-secret>
    username admin algorithm-type scrypt secret <strong-secret>
  references:
    - https://www.cisco.com/c/en/us/support/docs/security-vpn/secure-shell-ssh/107061-upgrade-pwd.html
  match_regex:
    - "(?im)^\\s*(enable\\s+password|username\\s+\\S+\\s+password)\\s+7\\s+\\S+"

- id: cisco-ios-no-service-password-encryption
  title: service password-encryption not enabled
  severity: medium
  vendor: cisco-ios
  domain: security
  description: |
    Without service password-encryption, any newly-typed cleartext
    passwords stay readable in the running-config.
  remediation: |
    Enable password encryption (note: this is type-7 obfuscation only —
    still upgrade to type-8/9 secrets for real security).
  fix_snippet: |
    service password-encryption
  references:
    - https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/security/config_library/15-mt/secuser-15-mt-library.html
  absent_regex:
    - "(?im)^\\s*service\\s+password-encryption"

- id: cisco-ios-enable-password-cleartext
  title: enable password stored in cleartext
  severity: critical
  vendor: cisco-ios
  domain: security
  description: |
    The privileged-EXEC password is stored as type 0 (cleartext).
  remediation: |
    Replace with `enable algorithm-type scrypt secret`.
  fix_snippet: |
    no enable password
    enable algorithm-type scrypt secret <strong-secret>
  references:
    - https://www.cisco.com/c/en/us/support/docs/security-vpn/secure-shell-ssh/107061-upgrade-pwd.html
  match_regex:
    - "(?im)^\\s*enable\\s+password\\s+(?!7\\s|5\\s|8\\s|9\\s)\\S+"

- id: cisco-ios-username-cleartext
  title: Local user account stored in cleartext
  severity: critical
  vendor: cisco-ios
  domain: security
  description: |
    A local username/password pair is stored in cleartext (type 0).
  remediation: |
    Recreate users with `algorithm-type scrypt`.
  fix_snippet: |
    username admin algorithm-type scrypt secret <strong-secret>
  references:
    - https://www.cisco.com/c/en/us/td/docs/ios-xml/ios/security/config_library/15-mt/secuser-15-mt-library.html
  match_regex:
    - "(?im)^\\s*username\\s+\\S+\\s+password\\s+(?!7\\s|5\\s|8\\s|9\\s)\\S+"

- id: cisco-ios-default-username
  title: Default or weak username detected
  severity: high
  vendor: cisco-ios
  domain: security
  description: |
    Common default usernames (cisco, admin, root) are heavily targeted
    by automated scanners.
  remediation: |
    Rename privileged accounts to non-guessable names and enforce MFA
    via TACACS+ / RADIUS.
  fix_snippet: |
    no username admin
    username netops-svc1 algorithm-type scrypt secret <strong-secret>
  references:
    - https://owasp.org/www-community/attacks/Credential_stuffing
  match_regex:
    - "(?im)^\\s*username\\s+(cisco|admin|root|test|guest|operator)\\b"
