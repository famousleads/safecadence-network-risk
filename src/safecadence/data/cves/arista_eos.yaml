  fixed_in: "4.31.2F or later"
  title: "Arista EOS eAPI authentication bypass via crafted requests"
  description: |
    A vulnerability in the eAPI HTTP server of Arista EOS could allow an
    attacker on the management network to bypass authentication checks
    when specific request patterns are sent.
  workaround: |
    Disable HTTP and force HTTPS on management api http-commands.
  references:
    - https://www.arista.com/en/support/advisories-notices
