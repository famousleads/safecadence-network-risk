# Compliance framework mappings — control_id → framework controls.
# Each control_id may map to multiple controls in multiple frameworks.
#
# v6.4.2 honesty pass: every control now carries mappings for the five
# frameworks the wizard advertises (NIST 800-53, CIS, PCI-DSS, ISO 27001,
# HIPAA) plus zero-trust where applicable. Previously many controls only
# had NIST + CIS + PCI which left ~46% of wizard combinations empty.

# ====================================================================
# Network controls
# ====================================================================

disable_telnet:
  nist-800-53: [AC-17, SC-7]
  cis: [net-1.1.4]
  pci-dss: ["2.3"]
  iso-27001: [A.9.1.2, A.13.1.1]
  hipaa: ["164.312(e)(1)"]
  zero-trust: [PR.AC-5, PR.PT-4]

enforce_ssh_v2:
  nist-800-53: [SC-8, SC-13]
  cis: ["5.2.1"]
  pci-dss: ["2.3"]
  iso-27001: [A.10.1.1, A.13.2.3]
  hipaa: ["164.312(e)(1)"]
  zero-trust: [PR.DS-2]

require_aaa:
  nist-800-53: [IA-2, AC-3]
  cis: ["1.5"]
  pci-dss: ["8.1"]
  iso-27001: [A.9.2.1, A.9.2.3]
  hipaa: ["164.312(a)(2)(i)"]
  zero-trust: [PR.AC-1, PR.AC-7]

enforce_snmpv3:
  nist-800-53: [SC-8, AC-17]
  cis: [net-2.4]
  pci-dss: ["2.3"]
  iso-27001: [A.13.1.1]
  hipaa: ["164.312(e)(1)"]
  zero-trust: [PR.DS-2]

enable_syslog:
  nist-800-53: [AU-3, AU-6]
  cis: ["8.2"]
  pci-dss: ["10.5"]
  hipaa: ["164.312(b)"]
  iso-27001: [A.12.4.1]
  zero-trust: [DE.CM-1, DE.CM-7]

enable_ntp:
  nist-800-53: [AU-8]
  cis: ["2.2.2"]
  pci-dss: ["10.4"]
  iso-27001: [A.12.4.4]
  hipaa: ["164.312(b)"]

block_insecure_crypto:
  nist-800-53: [SC-13]
  cis: ["5.2.4"]
  pci-dss: ["4.1"]
  hipaa: ["164.312(e)(2)(ii)"]
  iso-27001: [A.10.1.1, A.10.1.2]
  zero-trust: [PR.DS-2, PR.DS-5]

restrict_management_access:
  nist-800-53: [AC-3, AC-6, SC-7]
  cis: [net-3.1]
  pci-dss: ["1.3"]
  iso-27001: [A.9.4.1]
  hipaa: ["164.312(a)(1)"]
  zero-trust: [PR.AC-3, PR.AC-5]

enforce_patch_level:
  nist-800-53: [SI-2]
  cis: ["1.8"]
  pci-dss: ["6.2"]
  hipaa: ["164.308(a)(8)"]
  iso-27001: [A.12.6.1]
  zero-trust: [PR.IP-12]

