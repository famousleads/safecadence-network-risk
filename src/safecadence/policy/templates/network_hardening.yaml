policy_id: tmpl_network_hardening
policy_name: Network Hardening Baseline
description: |
  Industry-standard hardening for network devices: secure management,
  centralized auth/logging, modern crypto, and a restricted admin plane.
target_asset_types: [network]
severity: high
compliance_frameworks: [nist-800-53, cis, pci-dss]
enforcement_mode: warn
controls:
  - control_id: disable_telnet
    severity: high
  - control_id: enforce_ssh_v2
    severity: high
  - control_id: require_aaa
    severity: high
    parameters:
      aaa_protocol: tacacs
  - control_id: enforce_snmpv3
    severity: medium
  - control_id: enable_syslog
    severity: medium
    parameters:
      syslog_target: 10.10.10.50
  - control_id: enable_ntp
    severity: low
  - control_id: block_insecure_crypto
    severity: high
  - control_id: restrict_management_access
    severity: high
    parameters:
      allowed_cidrs: ["10.10.10.0/24"]
