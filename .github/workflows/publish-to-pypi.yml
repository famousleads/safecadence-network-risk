name: Publish to PyPI

# Triggers when you push a tag matching v*.*.*  (e.g. v2.2.3, v3.0.0)
# Uses PyPI's "Trusted Publishing" — no API token required, GitHub authenticates
# via OIDC. After the one-time PyPI configuration (see below) you can release new
# versions just by pushing a tag.

on:
  push:
    tags:
      - 'v*.*.*'

# REQUIRED: trusted publishing needs id-token: write permission.
permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    name: Build and publish ${{ github.ref_name }}
    runs-on: ubuntu-latest

    # The 'pypi' environment is required for Trusted Publishing.
    # PyPI verifies the workflow file path and the environment name match.
    environment:
      name: pypi
      url: https://pypi.org/project/safecadence-netrisk/

    steps:
      - name: Check out repo at the tag
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Verify the tag matches the package version
        # Belt-and-suspenders: refuse to publish if the git tag doesn't match
        # the version in pyproject.toml, prevents a typo from shipping the
        # wrong version to PyPI.
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag version:     $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::git tag ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION). Refusing to publish."
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel registers the safecadence CLI entry point
        # Belt-and-suspenders: catches a regression of the [project.scripts2] typo.
        run: |
          unzip -p dist/safecadence_netrisk-*-py3-none-any.whl '*entry_points.txt' \
            | grep -q 'safecadence = safecadence.cli:cli' \
            || (echo "::error::CLI entry point missing from wheel"; exit 1)

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        # No 'with: password:' — the action uses OIDC automatically.

      - name: Attach built distributions to the GitHub Release
        # Append the wheel + sdist to the GitHub Release for whichever tag triggered this.
        # Requires the release to already exist (we cut it manually with `gh release create`).
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/safecadence_netrisk-*.whl
            dist/safecadence_netrisk-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
