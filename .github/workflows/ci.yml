name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Install with [ai,server] so fastapi / httpx / sqlalchemy / etc.
          # are available — many v9+ tests import fastapi directly without
          # pytest.importorskip, and v10.5+ added more server-side endpoints.
          # Pin pydantic <2.13 (2.13 broke FastAPI's OpenAPI generation).
          pip install -e ".[ai,server]" "pydantic<2.13"
          # Pillow is needed by the v10.4+ PIL chart engine in
          # safecadence.reports.chart_png.
          pip install pytest pillow

      - name: Run tests
        run: pytest -v

      - name: Smoke-test the CLI
        run: |
          safecadence list-vendors
          safecadence list-rules --vendor cisco-ios
          safecadence scan examples/sample_configs/cisco_ios_running.txt --quiet
