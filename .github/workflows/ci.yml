name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ai]"
          pip install pytest

      - name: Run tests
        run: pytest -v

      - name: Smoke-test the CLI
        run: |
          safecadence list-vendors
          safecadence list-rules --vendor cisco-ios
          safecadence scan examples/sample_configs/cisco_ios_running.txt --quiet
